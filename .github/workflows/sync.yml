name: Todoist ↔ Notion Sync

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes
  workflow_dispatch:          # allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run sync
        env:
          TODOIST_API_TOKEN: ${{ secrets.TODOIST_API_TOKEN }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python sync.py

      - name: Save state back to repo
        run: |
          git config user.name "Todoist-Notion Sync Bot"
          git config user.email "sync-bot@users.noreply.github.com"
          git add state.json config.json
          git diff --staged --quiet || git commit -m "sync: update state $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
